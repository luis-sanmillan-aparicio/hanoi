<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torres de Hanoi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Josefin+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #070707;
      --surface:   #0f0f0f;
      --border:    #222;
      --gold:      #d4a843;
      --gold-dim:  rgba(212,168,67,.12);
      --gold-glow: 0 0 22px rgba(212,168,67,.45);
      --text:      #e0d4b8;
      --muted:     #5a5040;
      --danger:    #c0392b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overscroll-behavior: none;
      overflow: hidden;
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Josefin Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-user-select: none;
      user-select: none;
      touch-action: pan-y;
      -webkit-touch-callout: none;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(212,168,67,.07) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; overflow-y: auto;
      transition: opacity .45s, transform .45s;
      z-index: 10;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(.97);
    }

    #welcome {
      justify-content: center;
      gap: 44px; padding: 40px 24px;
      text-align: center;
    }

    .logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(26px, 5.5vw, 54px);
      color: var(--gold);
      text-shadow: var(--gold-glow);
      letter-spacing: .04em;
      line-height: 1.2;
    }
    .logo small {
      display: block;
      font-family: 'Josefin Mono', monospace;
      font-size: .36em;
      font-weight: 300;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 10px;
    }

    .diff-section { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .diff-label { font-size: 10px; letter-spacing: .35em; text-transform: uppercase; color: var(--muted); }
    .diff-row { display: flex; align-items: center; gap: 28px; }

    .icon-btn {
      width: 44px; height: 44px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text); font-size: 22px;
      cursor: pointer; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, color .2s, background .2s;
      font-family: 'Josefin Mono', monospace;
    }
    .icon-btn:hover:not(:disabled) {
      border-color: var(--gold); color: var(--gold);
      background: var(--gold-dim);
    }
    .icon-btn:disabled { opacity: .25; cursor: not-allowed; }

    .diff-number {
      font-size: 68px; font-weight: 600; line-height: 1;
      color: var(--gold); text-shadow: var(--gold-glow);
      min-width: 2ch; text-align: center;
    }

    .pips { display: flex; gap: 9px; align-items: center; }
    .pip {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); cursor: pointer;
      transition: background .2s, transform .2s, box-shadow .2s;
    }
    .pip.on {
      background: var(--gold);
      transform: scale(1.45);
      box-shadow: 0 0 8px rgba(212,168,67,.55);
    }

    .hint { font-size: 11px; color: var(--muted); letter-spacing: .12em; }

    .cta {
      padding: 15px 52px;
      background: none;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Josefin Mono', monospace;
      font-size: 13px; letter-spacing: .35em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: color .28s;
    }
    .cta::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--gold);
      transform: scaleX(0); transform-origin: left;
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      z-index: -1;
    }
    .cta:hover { color: var(--bg); box-shadow: var(--gold-glow); }
    .cta:hover::before { transform: scaleX(1); }

    #game-screen {
      justify-content: flex-start;
      padding: 12px 12px 20px;
    }

    .game-wrap {
      width: 100%; max-width: 920px;
      display: flex; flex-direction: column;
      gap: 8px;
      position: relative; z-index: 1;
    }

    .g-header {
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 6px;
    }

    .g-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 15px; color: var(--gold); letter-spacing: .04em;
    }

    .stats { display: flex; gap: 16px; }
    .stat { display: flex; flex-direction: column; align-items: flex-end; gap: 0px; }
    .stat-lbl { font-size: 7px; letter-spacing: .3em; text-transform: uppercase; color: var(--muted); }
    .stat-val { font-size: 16px; font-weight: 600; line-height: 1.1; }

    .g-actions { display: flex; gap: 6px; }
    .sm-btn {
      padding: 5px 10px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Josefin Mono', monospace;
      font-size: 9px; letter-spacing: .2em;
      text-transform: uppercase;
      cursor: pointer; border-radius: 2px;
      transition: border-color .2s, color .2s;
    }
    .sm-btn:hover { border-color: var(--gold); color: var(--gold); }

    .instr {
      font-size: 10px; color: var(--muted);
      letter-spacing: .12em; text-align: center;
      height: 16px; transition: color .2s;
    }
    .instr.active { color: var(--gold); }

    .pegs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      align-items: end;
      touch-action: none;
    }

    .peg-col {
      display: flex; flex-direction: column;
      align-items: center; cursor: pointer;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .cards-area {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      gap: 5px;
      padding: 0 4px;
      border-left: 1px solid transparent;
      border-right: 1px solid transparent;
      transition: border-color .18s, background .18s;
    }

    /* drop highlights now managed by drop-ok / drop-bad via pointer events */

    .rod {
      width: 2px;
      background: linear-gradient(to bottom, transparent, var(--border));
      position: absolute; top: 0;
      left: 50%; transform: translateX(-50%);
      pointer-events: none;
    }

    .peg-base {
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: .45;
      box-shadow: 0 0 8px rgba(212,168,67,.3);
    }

    .peg-lbl {
      font-size: 8px; letter-spacing: .32em;
      text-transform: uppercase; color: var(--muted);
      padding: 7px 0 3px;
      cursor: pointer;
    }
    .peg-lbl.marked {
      color: var(--gold);
      text-shadow: 0 0 8px var(--gold);
    }
    .peg-lbl.marked::after {
      content: ' \25B2';
    }

    .card {
      --cc: #888;
      flex-shrink: 0;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      position: relative;
      background: var(--surface);
      border: 2px solid var(--cc);
      color: var(--cc);
      text-shadow: 0 0 10px var(--cc);
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }
    .card::before {
      content: ''; position: absolute; inset: 0;
      border-radius: 4px;
      background: var(--cc); opacity: .1;
    }

    .card.is-top { cursor: grab; }
    .card.is-top:active { cursor: grabbing; }
    .card.is-top:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 28px rgba(0,0,0,.5), 0 0 14px var(--cc);
    }
    .card.selected {
      transform: translateY(-10px) scale(1.06) !important;
      box-shadow: 0 14px 36px rgba(0,0,0,.55), 0 0 22px var(--cc) !important;
      border-color: #fff !important;
      z-index: 20;
    }

    @keyframes place {
      from { transform: translateY(-24px); opacity: .4; }
      to   { transform: translateY(0);     opacity: 1;  }
    }
    .card.placing { animation: place .22s ease-out; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-7px); }
      40%      { transform: translateX(7px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .card.shaking { animation: shake .35s ease; }

    .card.drag-ghost {
      opacity: .35;
      pointer-events: none;
    }

    #floating-card {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Josefin Mono', monospace;
      font-weight: 600;
      border: 2px solid var(--cc, #888);
      color: var(--cc, #888);
      background: #0f0f0f;
      text-shadow: 0 0 10px var(--cc, #888);
      box-shadow: 0 20px 50px rgba(0,0,0,.7), 0 0 28px var(--cc, #888);
      transform: rotate(4deg) scale(1.08);
      transition: box-shadow .1s;
      will-change: left, top;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      -webkit-touch-callout: none;
    }
    #floating-card::before {
      content: ''; position: absolute; inset: 0;
      border-radius: 4px;
      background: var(--cc, #888); opacity: .12;
    }

    .peg-col.drop-ok  .cards-area { border-color: var(--gold);  background: var(--gold-dim); }
    .peg-col.drop-bad .cards-area { border-color: var(--danger); background: rgba(192,57,43,.1); }

    .card.mark-dim {
      opacity: .18;
      filter: grayscale(1);
      border-color: #333 !important;
      color: #333 !important;
      text-shadow: none !important;
      transition: opacity .35s, filter .35s;
    }
    .card.mark-dim::before { display: none; }

    .card.mark-dim.mark-arrow {
      opacity: 1 !important;
      filter: none !important;
      background: var(--surface);
      border-color: #333 !important;
      box-shadow: none !important;
    }
    .card.mark-dim.mark-arrow .arr-num {
      color: #2b2b2b;
      text-shadow: none;
    }
    .card.mark-dim.mark-arrow .arr {
      color: var(--gold);
      text-shadow: 0 0 8px var(--gold);
    }

    #win {
      position: fixed; inset: 0;
      background: rgba(7,7,7,.93);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 36px; z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity .55s;
    }
    #win.on { opacity: 1; pointer-events: all; }

    .win-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(34px, 7vw, 64px);
      color: var(--gold);
      text-shadow: 0 0 50px rgba(212,168,67,.85);
      animation: glow-pulse 2s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%,100% { text-shadow: 0 0 40px rgba(212,168,67,.75); }
      50%      { text-shadow: 0 0 90px rgba(212,168,67,1); }
    }

    .win-stats { display: flex; gap: 44px; text-align: center; }
    .win-sl { font-size: 9px; letter-spacing: .32em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .win-sv { font-size: 38px; font-weight: 600; }
    .win-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }

    .cf { position: fixed; pointer-events: none; z-index: 99; border-radius: 1px; }

    .cta-small {
      padding: 10px 32px;
      background: none;
      border: 1px solid var(--muted);
      color: var(--muted);
      font-family: 'Josefin Mono', monospace;
      font-size: 11px; letter-spacing: .3em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: color .28s, border-color .28s;
    }
    .cta-small::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--muted);
      transform: scaleX(0); transform-origin: left;
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      z-index: -1;
    }
    .cta-small:hover { color: var(--bg); border-color: var(--muted); }
    .cta-small:hover::before { transform: scaleX(1); }

    #solve-modal {
      position: fixed; inset: 0;
      background: rgba(7,7,7,.88);
      display: none;
      align-items: center; justify-content: center;
      z-index: 150;
    }
    #solve-modal.on { display: flex; }

    #solve-box {
      background: #0f0f0f;
      border: 1px solid var(--border);
      padding: 32px 28px;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      max-width: 320px; width: 90%;
    }
    .solve-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 13px; color: var(--gold);
      letter-spacing: .04em; text-align: center;
    }
    .solve-hint {
      font-size: 10px; color: var(--muted);
      letter-spacing: .1em; text-align: center;
      line-height: 1.7;
    }
    .solve-hint strong { color: var(--gold); }
    #solve-input {
      background: #000;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Josefin Mono', monospace;
      font-size: 28px; font-weight: 600;
      text-align: center;
      width: 120px; padding: 10px;
      outline: none;
      transition: border-color .2s;
    }
    #solve-input:focus { border-color: var(--gold); }
    .solve-btns { display: flex; gap: 12px; align-items: center; }
      .win-stats { gap: 24px; }
      .win-sv { font-size: 28px; }
    }
  </style>
</head>
<body>

<div class="screen" id="welcome">
  <div class="logo">
    Torres de Hanoi
    <small>el puzzle eterno</small>
  </div>
  <div class="diff-section">
    <div class="diff-label">Numero de discos</div>
    <div class="diff-row">
      <button class="icon-btn" id="btn-less">-</button>
      <div class="diff-number" id="dn">3</div>
      <button class="icon-btn" id="btn-more">+</button>
    </div>
    <div class="pips" id="pips"></div>
    <div class="hint" id="hint">Minimo de movimientos: 7</div>
  </div>
  <button class="cta" id="btn-start">Comenzar</button>
  <button class="cta-small" id="btn-solve">Resolver</button>
</div>

<div class="screen hidden" id="game-screen">
  <div class="game-wrap">
    <div class="g-header">
      <div class="stats">
        <div class="stat">
          <div class="stat-lbl">Movimientos</div>
          <div class="stat-val" id="s-moves">0</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Tiempo</div>
          <div class="stat-val" id="s-time">0:00</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Discos</div>
          <div class="stat-val" id="s-diff">3</div>
        </div>
      </div>
      <div class="g-actions">
        <button class="sm-btn" id="btn-restart">Pausar</button>
        <button class="sm-btn" id="btn-menu">Salir</button>
      </div>
    </div>
    <div class="pegs" id="pegs"></div>
  </div>
</div>

<div id="win">
  <div class="win-title">Victoria!</div>
  <div class="win-stats">
    <div>
      <div class="win-sl">Movimientos</div>
      <div class="win-sv" id="w-moves">0</div>
    </div>
    <div>
      <div class="win-sl">Tiempo</div>
      <div class="win-sv" id="w-time">0:00</div>
    </div>
    <div>
      <div class="win-sl">Minimo posible</div>
      <div class="win-sv" id="w-min">7</div>
    </div>
  </div>
  <div class="win-btns">
    <button class="cta" id="btn-again">Jugar de nuevo</button>
    <button class="sm-btn" id="btn-wm" style="padding:15px 28px;font-size:11px;">Cambiar dificultad</button>
  </div>
</div>

<div id="solve-modal">
  <div id="solve-box">
    <div class="solve-title">Resolver automaticamente</div>
    <div class="solve-hint">Escribe el tiempo entre movimientos (0-1000 ms)<br>o escribe <strong>t</strong> para avanzar toque a toque</div>
    <input id="solve-input" type="text" value="400" maxlength="4" autocomplete="off" spellcheck="false">
    <div class="solve-btns">
      <button class="cta" id="btn-solve-ok">Aceptar</button>
      <button class="sm-btn" id="btn-solve-cancel" style="padding:12px 22px;font-size:11px;">Cancelar</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  var pegs     = [[], [], []];
  var diff     = 3;
  var sel      = null;
  var moves    = 0;
  var secs     = 0;
  var timer    = null;
  var started  = false;
  var finished = false;

  // marcas visuales: clave = valor del disco, valor = 'dim' | 'arrow' | null
  var marks = {};

  // contadores de toques por disco
  var tapCounts = {};
  var tapTimes  = {};
  var lblCounts = [0, 0, 0];
  var lblTimes  = [0, 0, 0];

  // pointer drag state
  var pdFrom      = null;
  var pdDisk      = null;   // valor del disco que se esta tocando
  var pdFloat     = null;
  var pdGhost     = null;
  var pdOffX      = 0;
  var pdOffY      = 0;
  var pdMoved     = false;
  var pdStartX    = 0;
  var pdStartY    = 0;
  var DRAG_THRESH = 6;

  function buildPips() {
    var c = document.getElementById('pips');
    c.innerHTML = '';
    for (var i = 3; i <= 10; i++) {
      var p = document.createElement('div');
      p.className = 'pip' + (i === diff ? ' on' : '');
      (function(n) {
        p.addEventListener('click', function() { setDiff(n); });
      })(i);
      c.appendChild(p);
    }
  }

  function setDiff(n) {
    diff = Math.max(3, Math.min(10, n));
    document.getElementById('dn').textContent = diff;
    document.getElementById('hint').textContent =
      'Minimo de movimientos: ' + (Math.pow(2, diff) - 1);
    document.getElementById('btn-less').disabled = (diff === 3);
    document.getElementById('btn-more').disabled = (diff === 10);
    buildPips();
  }

  document.getElementById('btn-less').addEventListener('click', function() { setDiff(diff - 1); });
  document.getElementById('btn-more').addEventListener('click', function() { setDiff(diff + 1); });
  document.getElementById('btn-start').addEventListener('click', startGame);
  setDiff(3);

  function startGame() {
    finished = false; started = false;
    moves = 0; secs = 0; sel = null;
    pdFrom = null; pdDisk = null; pdMoved = false;
    clearDropHighlights();
    if (pdFloat) { pdFloat.remove(); pdFloat = null; }
    if (pdGhost) { pdGhost.classList.remove('drag-ghost'); pdGhost = null; }
    marks = {};
    tapCounts = {};
    tapTimes  = {};
    lblCounts = [0, 0, 0];
    lblTimes  = [0, 0, 0];
    document.querySelectorAll('.peg-lbl').forEach(function(l) {
      l.classList.remove('marked');
    });
    clearInterval(timer); timer = null;
    pegs = [[], [], []];
    for (var i = diff; i >= 1; i--) pegs[0].push(i);
    document.getElementById('s-diff').textContent = diff;
    updateStats();
    showScreen('game-screen');
    buildLayout();
    render();
  }

  function topDisk(p) {
    return pegs[p].length ? pegs[p][pegs[p].length - 1] : null;
  }

  function canMove(from, to) {
    if (from === to) return false;
    var d = topDisk(from);
    if (d === null) return false;
    var t = topDisk(to);
    return t === null || t > d;
  }

  function doMove(from, to) {
    if (!canMove(from, to)) return false;
    if (!started) {
      started = true;
      timer = setInterval(function() { secs++; updateStats(); }, 1000);
    }
    var d = pegs[from].pop();
    pegs[to].push(d);
    moves++;
    sel = null;
    updateStats();
    render(to);
    if (pegs[2].length === diff) {
      setTimeout(showWin, 380);
    }
    return true;
  }

  function diskColor(d) {
    var t = diff > 1 ? (d - 1) / (diff - 1) : 0;
    var h = Math.round(48 + t * 220);
    var s = Math.round(85 - t * 18);
    var l = Math.round(63 - t * 24);
    return 'hsl(' + h + ',' + s + '%,' + l + '%)';
  }

  function cardSize() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    // espacio reservado: header ~44px, gap ~8px, padding ~32px, base+label ~28px
    var reserved = 112;
    var gap = 4;
    var maxByHeight = Math.floor((vh - reserved - gap * diff) / diff);
    // límite por ancho de columna (cada columna es ~1/3 del ancho menos gaps)
    var colW = Math.floor((vw - 48) / 3);
    var maxByWidth = colW - 12;
    var size = Math.min(maxByHeight, maxByWidth);
    // clamp entre 34 y 80
    return Math.max(34, Math.min(80, size));
  }

  function buildLayout() {
    var container = document.getElementById('pegs');
    container.innerHTML = '';
    var cs   = cardSize();
    var gap  = cs < 45 ? 3 : 4;
    var areaH = diff * (cs + gap) + 12;
    var labels = ['Origen', 'Auxiliar', 'Destino'];

    // bloquear touchstart en toda la zona de juego (evita selección de texto en iOS)
    container.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });

    for (var p = 0; p < 3; p++) {
      (function(pegIndex) {
        var col = document.createElement('div');
        col.className = 'peg-col';
        col.id = 'col-' + pegIndex;

        var area = document.createElement('div');
        area.className = 'cards-area';
        area.id = 'area-' + pegIndex;
        area.style.height = areaH + 'px';
        area.style.gap    = gap + 'px';

        var rod = document.createElement('div');
        rod.className    = 'rod';
        rod.style.height = '100%';
        area.appendChild(rod);

        var base = document.createElement('div');
        base.className = 'peg-base';

        var label = document.createElement('div');
        label.className   = 'peg-lbl';
        label.textContent = labels[pegIndex];
        (function(idx) {
          label.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            e.stopPropagation();
            var now = Date.now();
            if ((now - lblTimes[idx]) > 1000) lblCounts[idx] = 0;
            lblTimes[idx] = now;
            lblCounts[idx]++;
            if (lblCounts[idx] >= 5) {
              lblCounts[idx] = 0;
              label.classList.toggle('marked');
            }
          });
        })(pegIndex);

        col.appendChild(area);
        col.appendChild(base);
        col.appendChild(label);

        col.addEventListener('click', function(e) { handleClick(pegIndex, e); });

        container.appendChild(col);
      })(p);
    }
  }

  function render(animPeg) {
    var cs = cardSize();
    var fs = cs < 60 ? 16 : cs < 70 ? 20 : 26;

    for (var p = 0; p < 3; p++) {
      var area = document.getElementById('area-' + p);
      var rod  = area.querySelector('.rod');
      area.innerHTML = '';
      area.appendChild(rod);

      var stack = pegs[p].slice().reverse();
      for (var vi = 0; vi < stack.length; vi++) {
        var d      = stack[vi];
        var isTop  = (vi === 0);
        var actualIdx = pegs[p].length - 1 - vi;

        var card = document.createElement('div');
        card.className = 'card' + (isTop ? ' is-top' : '');
        card.style.setProperty('--cc', diskColor(d));
        card.style.width    = cs + 'px';
        card.style.height   = cs + 'px';
        card.style.fontSize = fs + 'px';

        // aplicar marca visual
        var mk = marks[d];
        if (mk === 'dim') {
          card.classList.add('mark-dim');
          card.textContent = d;
        } else if (mk === 'arrow') {
          card.classList.add('mark-dim', 'mark-arrow');
          var num = document.createElement('span'); num.className = 'arr-num'; num.textContent = d;
          var aR  = document.createElement('span'); aR.className  = 'arr';     aR.textContent = '\u25B2';
          card.appendChild(num); card.appendChild(aR);
          card.style.fontSize = Math.round(fs * 0.75) + 'px';
        } else {
          card.textContent = d;
        }

        if (isTop && sel === p)            card.classList.add('selected');
        if (p === animPeg && actualIdx === pegs[p].length - 1) card.classList.add('placing');

        if (!finished) {
          (function(fromPeg, diskVal, topCard, cardEl) {
            cardEl.addEventListener('pointerdown', function(e) {
              if (e.button !== undefined && e.button !== 0) return;
              e.preventDefault();
              pdDisk = diskVal;

              if (topCard) {
                pdFrom   = fromPeg;
                pdMoved  = false;
                pdStartX = e.clientX;
                pdStartY = e.clientY;
                var rect = cardEl.getBoundingClientRect();
                pdOffX   = e.clientX - rect.left;
                pdOffY   = e.clientY - rect.top;
                pdGhost  = cardEl;
              }
            });
          })(p, d, isTop, card);
        }
        area.appendChild(card);
      }
    }
  }

  function handleClick(p, e) {
    if (finished) return;
    if (pdMoved) return;  // fue un drag, no un click
    if (sel === null) {
      if (pegs[p].length > 0) {
        sel = p;
        setInstr('Disco ' + topDisk(p) + ' seleccionado - haz clic en la columna destino', true);
        render();
      }
    } else if (sel === p) {
      sel = null;
      setInstr(null);
      render();
    } else {
      var from = sel;
      if (doMove(from, p)) {
        setInstr(null);
      } else {
        shake(from);
        setInstr('Movimiento no valido - no puedes poner un disco mayor sobre uno menor', false);
        setTimeout(function() { setInstr(null); }, 1800);
      }
    }
  }

  function shake(p) {
    var area    = document.getElementById('area-' + p);
    var topCard = area.querySelector('.card.is-top');
    if (!topCard) return;
    topCard.classList.add('shaking');
    setTimeout(function() { topCard.classList.remove('shaking'); }, 400);
  }

  function setInstr(msg, active) {
    // elemento eliminado de la UI, no-op
  }

  function updateStats() {
    document.getElementById('s-moves').textContent = moves;
    document.getElementById('s-time').textContent  = fmt(secs);
  }

  function fmt(s) {
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  function showWin() {
    clearInterval(timer);
    finished = true;
    document.getElementById('w-moves').textContent = moves;
    document.getElementById('w-time').textContent  = fmt(secs);
    document.getElementById('w-min').textContent   = Math.pow(2, diff) - 1;
    document.getElementById('win').classList.add('on');
    confetti();
  }

  function confetti() {
    var cols = ['#d4a843','#e0d4b8','#e74c3c','#2ecc71','#3498db','#9b59b6','#f39c12'];
    for (var i = 0; i < 70; i++) {
      (function(idx) {
        setTimeout(function() {
          var el  = document.createElement('div');
          el.className = 'cf';
          var sz  = 5 + Math.random() * 9;
          var col = cols[Math.floor(Math.random() * cols.length)];
          el.style.cssText = 'left:' + (Math.random() * 100) + 'vw;top:-12px;width:' + sz + 'px;height:' + sz + 'px;background:' + col + ';';
          document.body.appendChild(el);
          var drift = (Math.random() - 0.5) * 220;
          var dur   = 2200 + Math.random() * 2000;
          el.animate([
            { transform: 'translateY(0) translateX(0) rotate(0deg)', opacity: 1 },
            { transform: 'translateY(108vh) translateX(' + drift + 'px) rotate(720deg)', opacity: 0 }
          ], { duration: dur, easing: 'ease-in', fill: 'forwards' })
          .finished.then(function() { el.remove(); });
        }, idx * 55);
      })(i);
    }
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s) {
      s.classList.toggle('hidden', s.id !== id);
    });
  }

  function hideWin() {
    document.getElementById('win').classList.remove('on');
  }

  document.getElementById('btn-again').addEventListener('click', function() { hideWin(); startGame(); });
  document.getElementById('btn-wm').addEventListener('click', function() {
    stopSolver(); clearInterval(timer); hideWin(); showScreen('welcome');
  });

  // POINTER DRAG

  function clearDropHighlights() {
    for (var i = 0; i < 3; i++) {
      var c = document.getElementById('col-' + i);
      if (c) { c.classList.remove('drop-ok', 'drop-bad'); }
    }
  }

  function pegUnderPointer(x, y) {
    // hide float card so elementFromPoint can see through it
    if (pdFloat) pdFloat.style.display = 'none';
    var el = document.elementFromPoint(x, y);
    if (pdFloat) pdFloat.style.display = '';
    if (!el) return -1;
    var col = el.closest('.peg-col');
    if (!col) return -1;
    return parseInt(col.id.replace('col-', ''), 10);
  }

  function createFloatingCard(fromPeg, x, y) {
    var cs = cardSize();
    var fs = cs < 60 ? 16 : cs < 70 ? 20 : 26;
    var d  = topDisk(fromPeg);
    var f  = document.createElement('div');
    f.id   = 'floating-card';
    f.style.setProperty('--cc', diskColor(d));
    f.style.width    = cs + 'px';
    f.style.height   = cs + 'px';
    f.style.fontSize = fs + 'px';
    f.style.left     = (x - pdOffX) + 'px';
    f.style.top      = (y - pdOffY) + 'px';
    f.textContent    = d;
    document.body.appendChild(f);
    return f;
  }

  document.addEventListener('pointermove', function(e) {
    if (pdFrom === null || finished) return;

    var dx = e.clientX - pdStartX;
    var dy = e.clientY - pdStartY;

    if (!pdMoved) {
      if (Math.abs(dx) < DRAG_THRESH && Math.abs(dy) < DRAG_THRESH) return;
      // commit to drag: cancel click selection, show float
      pdMoved = true;
      sel     = null;
      if (pdGhost) pdGhost.classList.add('drag-ghost');
      pdFloat = createFloatingCard(pdFrom, e.clientX, e.clientY);
    }

    // move floating card
    pdFloat.style.left = (e.clientX - pdOffX) + 'px';
    pdFloat.style.top  = (e.clientY - pdOffY) + 'px';

    // highlight target column
    clearDropHighlights();
    var tgt = pegUnderPointer(e.clientX, e.clientY);
    if (tgt >= 0 && tgt !== pdFrom) {
      var col = document.getElementById('col-' + tgt);
      col.classList.add(canMove(pdFrom, tgt) ? 'drop-ok' : 'drop-bad');
    }
  });

  document.addEventListener('pointerup', function(e) {
    if (pdFrom === null && pdDisk === null) return;
    if (finished) { pdFrom = null; pdDisk = null; return; }

    clearDropHighlights();

    if (!pdMoved) {
      // fue un toque simple: contar para marcas
      if (pdDisk !== null) registerTap(pdDisk);
      // dejar que handleClick gestione el movimiento
      pdFrom = null; pdDisk = null; pdGhost = null;
      return;
    }

    // it was a drag — find target column
    var tgt = pegUnderPointer(e.clientX, e.clientY);

    // remove ghost tint and float
    if (pdGhost) { pdGhost.classList.remove('drag-ghost'); pdGhost = null; }

    if (tgt >= 0 && tgt !== pdFrom && canMove(pdFrom, tgt)) {
      // valid drop: remove float, do the move
      if (pdFloat) { pdFloat.remove(); pdFloat = null; }
      doMove(pdFrom, tgt);
    } else {
      // invalid or dropped outside: animate card back and shake if needed
      var invalidFrom = pdFrom;
      if (tgt >= 0 && tgt !== pdFrom) shake(pdFrom);
      if (pdFloat) {
        // fly back to original position
        var origArea = document.getElementById('area-' + invalidFrom);
        var origCard = origArea.querySelector('.card.is-top');
        var destRect = origCard ? origCard.getBoundingClientRect()
                                : origArea.getBoundingClientRect();
        pdFloat.style.transition = 'left .25s cubic-bezier(.4,0,.2,1), top .25s cubic-bezier(.4,0,.2,1), transform .25s, opacity .25s';
        pdFloat.style.transform  = 'rotate(0deg) scale(1)';
        pdFloat.style.left       = destRect.left + 'px';
        pdFloat.style.top        = destRect.top  + 'px';
        pdFloat.style.opacity    = '0';
        var floatRef = pdFloat;
        setTimeout(function() { floatRef.remove(); }, 280);
        pdFloat = null;
      }
      if (tgt >= 0 && tgt !== pdFrom) {
        setInstr('Movimiento no valido - no puedes poner un disco mayor sobre uno menor', false);
        setTimeout(function() { setInstr(null); }, 1800);
      }
    }

    pdFrom  = null;
    pdDisk  = null;
    pdMoved = false;
  });

  document.addEventListener('pointercancel', function() {
    clearDropHighlights();
    if (pdGhost) { pdGhost.classList.remove('drag-ghost'); pdGhost = null; }
    if (pdFloat) { pdFloat.remove(); pdFloat = null; }
    pdFrom  = null;
    pdDisk  = null;
    pdMoved = false;
  });

  // CONTADOR DE TOQUES - ciclo: normal -> dim -> arrow -> normal

  function registerTap(disk) {
    var now = Date.now();
    if ((now - (tapTimes[disk] || 0)) > 1000) {
      tapCounts[disk] = 0;
    }
    tapTimes[disk]  = now;
    tapCounts[disk] = (tapCounts[disk] || 0) + 1;

    if (tapCounts[disk] >= 5) {
      tapCounts[disk] = 0;
      var mk = marks[disk];
      if (!mk)           marks[disk] = 'dim';
      else if (mk === 'dim')   marks[disk] = 'arrow';
      else               marks[disk] = null;
      render();
    }
  }

  // SOLVER
  var solverMode    = false;   // true cuando el solver esta activo
  var solverPaused  = false;
  var solverMoves   = [];      // lista de {from, to}
  var solverIdx     = 0;
  var solverDelay   = 400;
  var solverStep    = false;   // true = modo t
  var solverTimer   = null;
  var solverResolve = null;    // para el modo t (promesa pendiente)

  function generateMoves(n, from, to, aux, list) {
    if (n === 0) return;
    generateMoves(n-1, from, aux, to, list);
    list.push({ from: from, to: to });
    generateMoves(n-1, aux, to, from, list);
  }

  function startSolver(delay, stepMode) {
    solverMode   = true;
    solverPaused = false;
    solverStep   = stepMode;
    solverDelay  = delay;
    solverMoves  = [];
    solverIdx    = 0;
    finished     = false;

    generateMoves(diff, 0, 2, 1, solverMoves);

    document.getElementById('btn-restart').textContent = 'Pausar';
    document.getElementById('btn-menu').textContent    = 'Salir';

    // bloquear interaccion del jugador
    document.getElementById('pegs').style.pointerEvents = 'none';

    runSolver();
  }

  function runSolver() {
    if (!solverMode) return;
    if (solverIdx >= solverMoves.length) {
      // terminado
      solverMode = false;
      document.getElementById('pegs').style.pointerEvents = '';
      setTimeout(showWin, 300);
      return;
    }
    if (solverPaused) return;

    var mv = solverMoves[solverIdx];
    solverIdx++;
    doMove(mv.from, mv.to);

    if (solverStep) {
      // modo t: espera toque/clic en cualquier sitio
      document.getElementById('pegs').style.pointerEvents = '';
      document.addEventListener('pointerup', stepListener);
    } else {
      solverTimer = setTimeout(runSolver, solverDelay);
    }
  }

  function stepListener() {
    document.removeEventListener('pointerup', stepListener);
    document.getElementById('pegs').style.pointerEvents = 'none';
    runSolver();
  }

  function stopSolver() {
    solverMode = false;
    solverPaused = false;
    if (solverTimer) { clearTimeout(solverTimer); solverTimer = null; }
    document.removeEventListener('pointerup', stepListener);
    document.getElementById('pegs').style.pointerEvents = '';
    document.getElementById('btn-restart').textContent = 'Pausar';
  }

  // modal
  document.getElementById('btn-solve').addEventListener('click', function() {
    document.getElementById('solve-modal').classList.add('on');
    document.getElementById('solve-input').focus();
  });
  document.getElementById('btn-solve-cancel').addEventListener('click', function() {
    document.getElementById('solve-modal').classList.remove('on');
  });
  document.getElementById('btn-solve-ok').addEventListener('click', function() {
    var val = document.getElementById('solve-input').value.trim().toLowerCase();
    document.getElementById('solve-modal').classList.remove('on');
    document.getElementById('solve-input').blur();
    var stepMode = (val === 't');
    var delay    = stepMode ? 0 : Math.max(0, Math.min(1000, parseInt(val) || 400));
    startGame();
    setTimeout(function() {
      buildLayout();
      render();
      startSolver(delay, stepMode);
    }, 320);
  });

  // Pausar / Continuar
  document.getElementById('btn-restart').addEventListener('click', function() {
    if (!solverMode) return;
    if (solverPaused) {
      solverPaused = false;
      document.getElementById('btn-restart').textContent = 'Pausar';
      if (!solverStep) runSolver();
    } else {
      solverPaused = true;
      if (solverTimer) { clearTimeout(solverTimer); solverTimer = null; }
      document.removeEventListener('pointerup', stepListener);
      document.getElementById('btn-restart').textContent = 'Continuar';
    }
  });

  document.getElementById('btn-menu').addEventListener('click', function() {
    stopSolver();
    clearInterval(timer);
    hideWin();
    showScreen('welcome');
    document.getElementById('btn-restart').textContent = 'Pausar';
    document.getElementById('btn-menu').textContent    = 'Salir';
  });

  window.addEventListener('resize', function() {
    if (!document.getElementById('game-screen').classList.contains('hidden')) {
      buildLayout();
      render();
    }
  });

});
</script>
</body>
</html>
